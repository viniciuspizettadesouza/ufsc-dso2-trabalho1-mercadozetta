services:
  mongo:
    image: mongo:7
    container_name: mercadozetta-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mercadozetta-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/mercadozetta
      JWT_SECRET: local_dev_secret_please_change_later
      PORT: 3333
      CORS_ORIGIN: http://localhost:5173
      RATE_LIMIT_AUTH_WINDOW_MS: 900000
      RATE_LIMIT_AUTH_MAX: 5
      RATE_LIMIT_REGISTER_WINDOW_MS: 900000
      RATE_LIMIT_REGISTER_MAX: 10
    ports:
      - "3333:3333"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333
      VITE_TENANT_ID: mercadozetta
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mercadozetta-mongo-data:
