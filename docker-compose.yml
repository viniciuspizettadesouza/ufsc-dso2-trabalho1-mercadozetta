services:
  postgres:
    image: postgres:18-alpine
    container_name: mercadozetta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mercadozetta
      POSTGRES_USER: mercadozetta
      POSTGRES_PASSWORD: local-development-only
    ports:
      - '5432:5432'
    volumes:
      - mercadozetta-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mercadozetta -d mercadozetta']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    environment:
      POSTGRESQL_URL: postgresql://mercadozetta:local-development-only@postgres:5432/mercadozetta
      JWT_SIGNING_KEYS: '{"current":"local_dev_secret_please_change_later"}'
      JWT_ACTIVE_KID: current
      REFRESH_TOKEN_HASH_SECRETS: '{"current":"local_dev_refresh_secret_please_change_later"}'
      REFRESH_TOKEN_HASH_ACTIVE_VERSION: current
      CSRF_SECRETS: '{"current":"local_dev_csrf_secret_please_change_later"}'
      CSRF_ACTIVE_VERSION: current
      ACCOUNT_TOKEN_HASH_SECRETS: '{"current":"local_dev_account_token_secret_please_change_later"}'
      ACCOUNT_TOKEN_HASH_ACTIVE_VERSION: current
      PORT: 3333
      TRUST_PROXY_HOPS: 0
      CORS_ORIGIN: http://localhost:5173
      PRODUCT_IMAGE_HOSTS: example.com,images.unsplash.com
      RATE_LIMIT_AUTH_WINDOW_MS: 900000
      RATE_LIMIT_AUTH_MAX: 5
      RATE_LIMIT_REGISTER_WINDOW_MS: 900000
      RATE_LIMIT_REGISTER_MAX: 10
    ports:
      - '3333:3333'
    depends_on:
      postgres:
        condition: service_healthy
    command: ['sh', '-c', 'npm run db:migrate && exec npm run dev']

  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333
      VITE_TENANT_ID: mercadozetta
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  mercadozetta-postgres-data:
