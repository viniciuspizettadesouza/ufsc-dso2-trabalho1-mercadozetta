services:
  mongo:
    image: mongo:7.0.37-jammy
    container_name: mercadozetta-mongo
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mercadozetta-mongo-data:/data/db
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --eval "try { rs.status().ok } catch (error) { rs.initiate({_id: ''rs0'', members: [{_id: 0, host: ''mongo:27017''}]}).ok }"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/mercadozetta?replicaSet=rs0
      JWT_SIGNING_KEYS: '{"current":"local_dev_secret_please_change_later"}'
      JWT_ACTIVE_KID: current
      REFRESH_TOKEN_HASH_SECRETS: '{"current":"local_dev_refresh_secret_please_change_later"}'
      REFRESH_TOKEN_HASH_ACTIVE_VERSION: current
      CSRF_SECRETS: '{"current":"local_dev_csrf_secret_please_change_later"}'
      CSRF_ACTIVE_VERSION: current
      PORT: 3333
      TRUST_PROXY_HOPS: 0
      CORS_ORIGIN: http://localhost:5173
      RATE_LIMIT_AUTH_WINDOW_MS: 900000
      RATE_LIMIT_AUTH_MAX: 5
      RATE_LIMIT_REGISTER_WINDOW_MS: 900000
      RATE_LIMIT_REGISTER_MAX: 10
    ports:
      - '3333:3333'
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333
      VITE_TENANT_ID: mercadozetta
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  mercadozetta-mongo-data:
