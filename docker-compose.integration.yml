services:
  mongo-integration:
    image: mongo:7.0.37-jammy
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --eval "try { rs.status().ok } catch (error) { rs.initiate({_id: ''rs0'', members: [{_id: 0, host: ''mongo-integration:27017''}]}).ok }"',
        ]
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /data/db

  integration-tests:
    build:
      context: ./backend
      target: development
    environment:
      NODE_ENV: test
      JWT_SIGNING_KEYS: '{"current":"integration-jwt-current","previous":"integration-jwt-previous"}'
      JWT_ACTIVE_KID: current
      REFRESH_TOKEN_HASH_SECRETS: '{"current":"integration-refresh-current","previous":"integration-refresh-previous"}'
      REFRESH_TOKEN_HASH_ACTIVE_VERSION: current
      CSRF_SECRETS: '{"current":"integration-csrf-current","previous":"integration-csrf-previous"}'
      CSRF_ACTIVE_VERSION: current
      MONGODB_URI: mongodb://mongo-integration:27017/mercadozetta_integration?replicaSet=rs0
    depends_on:
      mongo-integration:
        condition: service_healthy
    command: ['npm', 'run', 'test:integration']
