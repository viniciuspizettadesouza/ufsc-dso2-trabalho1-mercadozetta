services:
  postgres-integration:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: mercadozetta_integration
      POSTGRES_USER: mercadozetta
      POSTGRES_PASSWORD: integration-only
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U mercadozetta -d mercadozetta_integration']
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql

  integration-tests:
    build:
      context: ./backend
      target: development
    environment:
      NODE_ENV: test
      JWT_SIGNING_KEYS: '{"current":"integration-jwt-current","previous":"integration-jwt-previous"}'
      JWT_ACTIVE_KID: current
      REFRESH_TOKEN_HASH_SECRETS: '{"current":"integration-refresh-current","previous":"integration-refresh-previous"}'
      REFRESH_TOKEN_HASH_ACTIVE_VERSION: current
      CSRF_SECRETS: '{"current":"integration-csrf-current","previous":"integration-csrf-previous"}'
      CSRF_ACTIVE_VERSION: current
      ACCOUNT_TOKEN_HASH_SECRETS: '{"current":"integration-account-token-current","previous":"integration-account-token-previous"}'
      ACCOUNT_TOKEN_HASH_ACTIVE_VERSION: current
      RATE_LIMIT_AUTH_MAX: 100
      POSTGRESQL_URL: postgresql://mercadozetta:integration-only@postgres-integration:5432/mercadozetta_integration
    depends_on:
      postgres-integration:
        condition: service_healthy
    command: ['sh', '-c', 'npm run db:migrate && npm run test:integration']
