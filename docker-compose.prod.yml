services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mercadozetta}
      POSTGRES_USER: ${POSTGRES_USER:-mercadozetta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - mercadozetta-postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-mercadozetta} -d ${POSTGRES_DB:-mercadozetta}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: ${BACKEND_IMAGE:-mercadozetta-backend:local}
    build:
      context: ./backend
      target: production
    restart: 'no'
    environment:
      POSTGRESQL_URL: postgresql://${POSTGRES_USER:-mercadozetta}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mercadozetta}
    depends_on:
      postgres:
        condition: service_healthy
    command: ['npm', 'run', 'db:migrate:runtime']

  backend:
    image: ${BACKEND_IMAGE:-mercadozetta-backend:local}
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRESQL_URL: postgresql://${POSTGRES_USER:-mercadozetta}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mercadozetta}
      JWT_SIGNING_KEYS: ${JWT_SIGNING_KEYS:?Set JWT_SIGNING_KEYS}
      JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:?Set JWT_ACTIVE_KID}
      REFRESH_TOKEN_HASH_SECRETS: ${REFRESH_TOKEN_HASH_SECRETS:?Set REFRESH_TOKEN_HASH_SECRETS}
      REFRESH_TOKEN_HASH_ACTIVE_VERSION: ${REFRESH_TOKEN_HASH_ACTIVE_VERSION:?Set REFRESH_TOKEN_HASH_ACTIVE_VERSION}
      CSRF_SECRETS: ${CSRF_SECRETS:?Set CSRF_SECRETS}
      CSRF_ACTIVE_VERSION: ${CSRF_ACTIVE_VERSION:?Set CSRF_ACTIVE_VERSION}
      PORT: 3333
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN to the public frontend origin}
      TENANT_HEADER_REQUIRED: 'true'
      HEALTHCHECK_TENANT_ID: mercadozetta
      RATE_LIMIT_AUTH_WINDOW_MS: ${RATE_LIMIT_AUTH_WINDOW_MS:-900000}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-5}
      RATE_LIMIT_REGISTER_WINDOW_MS: ${RATE_LIMIT_REGISTER_WINDOW_MS:-900000}
      RATE_LIMIT_REGISTER_MAX: ${RATE_LIMIT_REGISTER_MAX:-10}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const request=http.get({host:'127.0.0.1',port:3333,path:'/ready',headers:{'X-Tenant-Id':'mercadozetta'}},response=>process.exit(response.statusCode===200?0:1));request.on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    image: ${FRONTEND_IMAGE:-mercadozetta-frontend:local}
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: /api
        VITE_TENANT_ID: ${VITE_TENANT_ID:-mercadozetta}
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:8080'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '--quiet', '--spider', 'http://127.0.0.1:8080/healthz']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mercadozetta-postgres-data:
