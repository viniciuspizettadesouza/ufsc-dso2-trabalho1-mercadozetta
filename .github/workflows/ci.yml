name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'
      - 'chore/**'
      - 'test/**'
      - 'refactor/**'
      - 'ci/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  audit:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit backend dependencies
        run: npm --prefix backend audit --audit-level=high

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Check formatting
        run: npm run format:check

      - name: Check deployment templates
        run: npm run check:deployment

      - name: Check generated API types
        run: npm run check:api-types

      - name: Lint backend
        run: npm run lint:backend

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Typecheck backend
        run: npm run typecheck

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Test backend
        run: npm run test:backend

      - name: Test frontend
        run: npm run test:frontend

      - name: Test database integration
        run: npm run test:integration

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser workflows
        run: npm run test:e2e

      - name: Smoke test production images
        run: npm run test:production
