services:
  postgres-e2e:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: mercadozetta_e2e
      POSTGRES_USER: mercadozetta
      POSTGRES_PASSWORD: e2e-only
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mercadozetta -d mercadozetta_e2e']
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql

  backend-e2e:
    build:
      context: ./backend
      target: development
    environment:
      NODE_ENV: test
      POSTGRESQL_URL: postgresql://mercadozetta:e2e-only@postgres-e2e:5432/mercadozetta_e2e
      JWT_SIGNING_KEYS: '{"current":"e2e-jwt-current","previous":"e2e-jwt-previous"}'
      JWT_ACTIVE_KID: current
      REFRESH_TOKEN_HASH_SECRETS: '{"current":"e2e-refresh-current","previous":"e2e-refresh-previous"}'
      REFRESH_TOKEN_HASH_ACTIVE_VERSION: current
      CSRF_SECRETS: '{"current":"e2e-csrf-current","previous":"e2e-csrf-previous"}'
      CSRF_ACTIVE_VERSION: current
      ACCOUNT_TOKEN_HASH_SECRETS: '{"current":"e2e-account-token-current","previous":"e2e-account-token-previous"}'
      ACCOUNT_TOKEN_HASH_ACTIVE_VERSION: current
      PORT: 3333
      CORS_ORIGIN: http://localhost:6173
      RATE_LIMIT_AUTH_MAX: 100
      RATE_LIMIT_REGISTER_MAX: 100
    ports:
      - '4333:3333'
    depends_on:
      postgres-e2e:
        condition: service_healthy
    command: ['sh', '-ec', 'npm run db:migrate; exec npm run dev']
    healthcheck:
      test:
        ['CMD', 'wget', '--quiet', '--spider', 'http://localhost:3333/health']
      interval: 1s
      timeout: 5s
      retries: 30

  frontend-e2e:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: http://localhost:4333
      VITE_TENANT_ID: ${E2E_TENANT_ID:-mercadozetta}
    ports:
      - '6173:5173'
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://127.0.0.1:5173']
      interval: 1s
      timeout: 5s
      retries: 30
